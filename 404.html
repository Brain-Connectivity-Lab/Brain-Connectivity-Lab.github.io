<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Brain Connectivity Lab</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Encodes the current path as a query param and redirects to index.html
      // so React Router can handle the route on the client side.
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1)
            .join("/") +
          "/?/" +
          l.pathname.slice(1).replace(/&/g, "~and~") +
          (l.search
            ? "&" + l.search.slice(1).replace(/&/g, "~and~")
            : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
